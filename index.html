        <div className="grid md:grid-cols-2 gap-6">{t[`${mk}_cards`].map((c,i)=>(
          <div key={i} className="bg-white dark:bg-slate-800 p-6 rounded-xl border-l-4 border-[#004030] shadow-sm hover:shadow-md transition-shadow">
            <h3 className="text-lg font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-2">{c.title}</h3>
            <p className="text-sm whitespace-pre-line">{c.desc}</p>
          </div>
        ))}</div>
        <div className="bg-[#004030] text-white dark:bg-slate-700 p-6 rounded-xl shadow-md">
          <h3 className="font-serif font-bold text-lg text-[#D8C3A5] mb-3">{t[`${mk}_case_title`]}</h3>
          <p className="text-sm leading-relaxed text-[#D8C3A5]/90 mb-4">{t[`${mk}_case`]}</p>
          <div className="bg-white/10 rounded-lg p-4">
            <p className="text-sm font-bold text-[#D8C3A5]">{t[`${mk}_case_lesson`]}</p>
          </div>
        </div>
        <div className="mt-8"><h3 className="text-sm font-bold uppercase tracking-wider text-slate-500 mb-4">{t.key_terms}</h3>
        <div key={`terms-${module}`} className="grid grid-cols-1 md:grid-cols-3 gap-4">{t[`${mk}_terms`].map((term,i)=><FlipCard key={i} front={term.front} back={term.back} t={t}/>)}</div></div>
        {/* ModuleQuiz 元件會因為這裡設定的 key={`quiz-${module}`} 在切換分頁時重新建立，確保前一次的答案和狀態不會帶入。 */}
        <ModuleQuiz key={`quiz-${module}`} questions={t[`${mk}_q`]} t={t} moduleId={num} onQuizSubmit={handleQuizSubmit}/>
        {renderNavBottom()}
      </div>
    );
  };

  const renderResources = () => {
    const links = [
      {label:lang==='zh'?'Teece (1997) Dynamic Capabilities 經典論文':'Teece (1997) Dynamic Capabilities Classic Paper',url:'https://onlinelibrary.wiley.com/doi/abs/10.1002/(SICI)1097-0266(199708)18:7%3C509::AID-SMJ882%3E3.0.CO;2-Z',desc:lang==='zh'?'Strategic Management Journal 最高引用論文之一':'One of the most cited papers in Strategic Management Journal'},
      {label:lang==='zh'?'Nonaka (1994) 知識創造理論':'Nonaka (1994) Knowledge-Creating Theory',url:'https://pubsonline.informs.org/doi/abs/10.1287/orsc.5.1.14',desc:lang==='zh'?'SECI 模型的理論基礎':'Theoretical foundation of the SECI model'},
      {label:lang==='zh'?'Senge《第五項修練》':'Senge - The Fifth Discipline',url:'https://www.amazon.com/Fifth-Discipline-Practice-Learning-Organization/dp/0385517254',desc:lang==='zh'?'學習型組織的經典著作':'The classic work on learning organizations'},
      {label:lang==='zh'?'March (1991) Exploration and Exploitation':'March (1991) Exploration and Exploitation',url:'https://pubsonline.informs.org/doi/abs/10.1287/orsc.2.1.71',desc:lang==='zh'?'探索與利用平衡的開創性論文':'Pioneering paper on exploration-exploitation balance'},
    ];
    const otherLinks = [
      {icon:'🏭',cat:lang==='zh'?'台灣產業案例':'Taiwan Industry Cases',items:[
        {label:lang==='zh'?'台積電動態能力分析（哈佛商業評論）':'TSMC Dynamic Capabilities (HBR)',url:'https://www.hbrtaiwan.com',desc:lang==='zh'?'台積電如何以動態能力維持全球領先':'How TSMC maintains global leadership through dynamic capabilities'},
        {label:lang==='zh'?'宏碁微笑曲線的演變':'Acer Smiling Curve Evolution',url:'https://www.acer.com',desc:lang==='zh'?'從 OEM 到品牌的轉型歷程':'The transformation journey from OEM to brand'},
      ]},
      {icon:'📚',cat:lang==='zh'?'學術資源':'Academic Resources',items:[
        {label:lang==='zh'?'O\'Reilly & Tushman: 組織雙元性':'O\'Reilly & Tushman: Ambidexterity',url:'https://hbr.org/2004/04/the-ambidextrous-organization',desc:lang==='zh'?'Harvard Business Review 雙元組織的經典文章':'Classic HBR article on ambidextrous organizations'},
        {label:lang==='zh'?'Prahalad & Hamel: 核心能耐':'Prahalad & Hamel: Core Competence',url:'https://hbr.org/1990/05/the-core-competence-of-the-corporation',desc:lang==='zh'?'HBR 1990 經典論文':'HBR 1990 classic paper'},
      ]},
    ];
    return (
      <div className={`space-y-10 ${fade}`}>
        <H2>{t.m6_title}</H2>
        <p className="text-slate-500 dark:text-slate-400">{t.m6_desc}</p>
        <div className="grid md:grid-cols-2 gap-3">{links.map((l,i)=><LinkCard key={i} {...l}/>)}</div>
        {otherLinks.map((sec,si)=>(
          <div key={si}>
            <h3 className="flex items-center gap-2 text-base font-bold text-slate-600 dark:text-slate-400 uppercase tracking-wide mb-3"><span>{sec.icon}</span>{sec.cat}</h3>
            <div className="grid md:grid-cols-2 gap-3">{sec.items.map((l,i)=><LinkCard key={i} {...l}/>)}</div>
          </div>
        ))}
        <div className="bg-[#004030]/5 dark:bg-[#D8C3A5]/5 rounded-xl p-5 border border-[#004030]/20 dark:border-[#D8C3A5]/20">
          <p className="text-sm text-slate-600 dark:text-slate-400">{lang==='zh'?'⚠️ 以上連結為外部資源，內容由原始作者維護，僅供學術參考之用。':'⚠️ External links maintained by original authors. For academic reference only.'}</p>
        </div>
        {renderNavBottom()}
      </div>
    );
  };

  const renderLab = () => (
    <div className={`space-y-8 ${fade}`}>
      <H2>{t.mlab_title}</H2>
      <p className="text-slate-600 dark:text-slate-400">{t.mlab_desc}</p>
      <LifecycleLab lang={lang}/>
      <div className="grid md:grid-cols-2 gap-6">
        <DynamicCapLab lang={lang}/>
        <SECILab lang={lang}/>
      </div>
      <AmbidexterityLab lang={lang}/>
      {renderNavBottom()}
    </div>
  );

  const renderContent = () => {
    if (module === 0) return (
      <div className={`space-y-8 text-lg leading-relaxed text-slate-700 dark:text-slate-300 ${fade}`}>
        <div className="bg-[#004030] dark:bg-slate-800 rounded-2xl p-6 sm:p-8 text-white">
          <p className="text-xs font-bold uppercase tracking-widest text-[#D8C3A5] mb-3">{lang==='zh'?'課程簡介':'Course Introduction'}</p>
          <h2 className="text-2xl sm:text-3xl md:text-4xl font-serif font-black text-white mb-4">{t.m0_title}</h2>
          <p className="text-[#D8C3A5]/90 text-base leading-relaxed">{t.m0_intro}</p>
        </div>
        <div className="bg-white dark:bg-slate-800 rounded-xl p-6 border-l-4 border-[#D8C3A5] shadow-sm">
          <h3 className="text-xl font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-3">{t.m0_why}</h3>
          <p className="text-base">{t.m0_why_desc}</p>
        </div>
        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">{t.m0_stats.map((s,i)=>(
          <div key={i} className="bg-white dark:bg-slate-800 rounded-xl p-5 text-center shadow-sm border border-slate-200 dark:border-slate-700">
            <div className="text-2xl md:text-3xl font-black font-serif text-[#004030] dark:text-[#D8C3A5] mb-1">{s.val}</div>
            <div className="text-xs text-slate-500 dark:text-slate-400">{s.label}</div>
          </div>
        ))}</div>
        <div>
          <h3 className="text-lg font-bold uppercase tracking-wider text-slate-500 mb-4">{lang==='zh'?'課程模組':'Course Modules'}</h3>
          <div className="space-y-3">{t.m0_modules.map((m,i)=>(
            <button key={i} onClick={()=>setModule(i+1)} className="w-full flex items-center gap-5 bg-white dark:bg-slate-800 rounded-xl px-6 py-4 border border-slate-200 dark:border-slate-700 hover:border-[#004030] dark:hover:border-[#D8C3A5] hover:shadow-md transition-all text-left group">
              <div className="text-3xl font-black font-serif text-[#D8C3A5] w-10 shrink-0">{m.num}</div>
              <div className="flex-1"><div className="font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-1">{m.title}</div><div className="text-sm text-slate-500">{m.desc}</div></div>
              <IconChevronRight size={20} className="text-slate-300 group-hover:text-[#004030] dark:group-hover:text-[#D8C3A5] shrink-0"/>
            </button>
          ))}</div>
        </div>
        <div className="flex justify-end">
          <button onClick={()=>setModule(1)} className="px-8 py-3 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-serif font-bold hover:bg-[#002b20] rounded-lg shadow-md">{t.m0_start}</button>
        </div>
      </div>
    );
    if (module >= 1 && module <= N) return renderModule(module);
    if (module === N+1) return renderResources();
    if (module === N+2) return renderLab();
    if (module === N+3) {
      const totalTime = analytics.time.reduce((a,b)=>a+b,0);
      const totalClicks = analytics.clicks.reduce((a,b)=>a+b,0);
      const totalCorrect = analytics.quizCorrect.reduce((a,b)=>a+b,0);
      const totalAnswered = analytics.quizTotal.reduce((a,b)=>a+b,0);
      const overallAcc = totalAnswered > 0 ? Math.round(totalCorrect/totalAnswered*100)+'%' : t.analytics_no_data;
      const canExport = studentInfo.group && studentInfo.dept && studentInfo.id && studentInfo.name;
      const mNavKeys = ['m1_nav','m2_nav','m3_nav','m4_nav','m5_nav'];
      return (
        <div className={base}>
          <H2>{t.analytics_title}</H2>
          <p className="text-slate-500 dark:text-slate-400">{t.analytics_desc}</p>
          <div className="grid grid-cols-3 gap-4">{[{label:t.analytics_total_time,val:totalTime+t.analytics_sec},{label:t.analytics_total_clicks,val:totalClicks+t.analytics_times},{label:t.analytics_overall_acc,val:overallAcc}].map((s,i)=>(
            <div key={i} className="bg-white dark:bg-slate-800 rounded-xl p-4 border border-slate-200 dark:border-slate-700 text-center shadow-sm">
              <p className="text-2xl font-black font-serif text-[#004030] dark:text-[#D8C3A5]">{s.val}</p>
              <p className="text-xs text-slate-500 mt-1">{s.label}</p>
            </div>
          ))}</div>
          <div className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 overflow-hidden shadow-sm">
            <table className="w-full text-sm"><thead><tr className="bg-[#004030] text-[#D8C3A5]">
              <th className="text-left p-3">{t.analytics_module}</th><th className="text-center p-3">{t.analytics_time}</th><th className="text-center p-3">{t.analytics_clicks}</th><th className="text-center p-3">{t.analytics_acc}</th><th className="text-center p-3 hidden md:table-cell">{t.analytics_correct_ans_total}</th>
            </tr></thead><tbody>{Array.from({length:N},(_,i)=>{
              const acc=analytics.quizTotal[i]>0?Math.round(analytics.quizCorrect[i]/analytics.quizTotal[i]*100)+'%':t.analytics_no_data;
              const ans=analytics.quizTotal[i]>0?`${analytics.quizCorrect[i]}/${analytics.quizTotal[i]}/8`:t.analytics_no_data;
              return <tr key={i} className="border-t border-slate-100 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700/50"><td className="p-3 font-medium text-[#004030] dark:text-[#D8C3A5]">{t[mNavKeys[i]]}</td><td className="p-3 text-center">{analytics.time[i]}{t.analytics_sec}</td><td className="p-3 text-center">{analytics.clicks[i]}{t.analytics_times}</td><td className="p-3 text-center">{acc}</td><td className="p-3 text-center hidden md:table-cell">{ans}</td></tr>;
            })}</tbody></table>
          </div>
          <div className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 p-6 shadow-sm">
            <h3 className="font-serif font-bold text-lg text-[#004030] dark:text-[#D8C3A5] mb-4">{t.analytics_form_title}</h3>
            <div className="grid grid-cols-2 gap-4">
              <div><label className="block text-xs font-semibold text-slate-600 dark:text-slate-400 mb-1">{t.analytics_group}</label>
                <select value={studentInfo.group} onChange={e=>setStudentInfo({...studentInfo,group:e.target.value})} className="w-full border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 text-sm bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-200"><option value="">--</option>{t.group_options.map(g=><option key={g} value={g}>{g}</option>)}</select></div>
              <div><label className="block text-xs font-semibold text-slate-600 dark:text-slate-400 mb-1">{t.analytics_dept}</label>
                <input value={studentInfo.dept} onChange={e=>setStudentInfo({...studentInfo,dept:e.target.value})} placeholder={t.analytics_dept_ph} className="w-full border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 text-sm bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-200"/></div>
              <div><label className="block text-xs font-semibold text-slate-600 dark:text-slate-400 mb-1">{t.analytics_id}</label>
                <input value={studentInfo.id} onChange={e=>setStudentInfo({...studentInfo,id:e.target.value})} placeholder={t.analytics_id_ph} className="w-full border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 text-sm bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-200"/></div>
              <div><label className="block text-xs font-semibold text-slate-600 dark:text-slate-400 mb-1">{t.analytics_name}</label>
                <input value={studentInfo.name} onChange={e=>setStudentInfo({...studentInfo,name:e.target.value})} placeholder={t.analytics_name_ph} className="w-full border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 text-sm bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-200"/></div>
            </div>
            <button onClick={handleExportCSV} disabled={!canExport} className="mt-4 px-6 py-2.5 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg disabled:opacity-40 hover:bg-[#002b20] transition-colors text-sm">{canExport?t.analytics_export_csv:t.analytics_fill_required}</button>
          </div>
          {renderNavBottom()}
        </div>
      );
    }
  };

  return (
    <div className="min-h-screen bg-[#f4f4f4] dark:bg-[#121212] font-sans selection:bg-[#004030] selection:text-white dark:selection:bg-[#D8C3A5] dark:selection:text-[#004030] flex flex-col overflow-x-hidden pt-16">
      <header className="fixed top-0 left-0 right-0 h-16 bg-[#004030] dark:bg-slate-900 text-white z-50 shadow-lg border-b border-[#D8C3A5]/30">
        <div className="max-w-7xl mx-auto px-3 sm:px-4 lg:px-6 h-16 flex items-center justify-between">
          <div className="flex items-center space-x-3">
            <div className="relative" ref={menuRef}>
              <button className="p-2 hover:bg-white/10 rounded-lg" onClick={()=>setMenuOpen(!menuOpen)}>{menuOpen?<IconX size={20}/>:<IconMenu size={20}/>}</button>
              {menuOpen && (
                <div className="absolute top-full left-0 mt-1 w-64 max-w-[calc(100vw-2rem)] max-h-[calc(100vh-5rem)] overflow-y-auto bg-white dark:bg-slate-800 rounded-xl shadow-2xl border border-slate-200 dark:border-slate-700 z-[100] overflow-x-hidden">
                  <div className="bg-[#004030]/5 dark:bg-[#D8C3A5]/5 px-4 py-2 border-b border-slate-200 dark:border-slate-700"><p className="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">{t.nav_modules}</p></div>
                  {modulesList.map(m=>(
                    <button key={m.id} onClick={()=>{setModule(m.id);setMenuOpen(false);}} className={`w-full flex items-center gap-3 px-4 py-3 text-sm font-medium transition-colors text-left ${module===m.id?'bg-[#004030] text-white dark:bg-[#D8C3A5]/20 dark:text-[#D8C3A5] font-bold':'text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700/50'}`}>
                      <span className={module===m.id?'text-[#D8C3A5]':'opacity-50'}>{m.icon}</span><span className="truncate">{m.title}</span>
                    </button>
                  ))}
                </div>
              )}
            </div>
            <button onClick={()=>window.scrollTo({top:0,behavior:'smooth'})} className="flex items-center gap-2 hover:opacity-80 transition-opacity">
              <div className="font-serif font-black text-lg tracking-widest text-[#D8C3A5]">DCL</div>
              <div className="hidden sm:block text-left"><h1 className="font-serif font-bold text-sm md:text-base leading-tight">{t.title}</h1><p className="text-[10px] text-[#D8C3A5]/70">{t.subtitle}</p></div>
            </button>
          </div>
          <div className="flex items-center space-x-1">
            <div className="flex items-center space-x-1 mr-2">
              {ttsState!=='playing'?(<button onClick={()=>handleTTS('play')} title={t.audio_read} className="p-2 rounded-full hover:bg-white/10 transition-colors flex items-center space-x-1 text-xs"><IconPlay size={14}/><span className="hidden md:inline">{t.audio_read}</span></button>):(<button onClick={()=>handleTTS('pause')} className="p-2 rounded-full hover:bg-white/10 transition-colors"><IconPause size={14}/></button>)}
              {ttsState!=='idle'&&<button onClick={()=>handleTTS('stop')} className="p-2 rounded-full hover:bg-white/10 transition-colors"><IconSquare size={14}/></button>}
            </div>
            <button onClick={()=>setLang(lang==='zh'?'en':'zh')} className="px-3 py-1 rounded-full bg-white/10 hover:bg-white/20 text-sm font-bold transition-colors">{lang==='zh'?'EN':'中文'}</button>
            <button onClick={()=>setIsDark(!isDark)} className="p-2 rounded-full hover:bg-white/10 transition-colors">{isDark?<IconSun size={18}/>:<IconMoon size={18}/>}</button>
          </div>
        </div>
      </header>
      <div className="max-w-7xl mx-auto w-full px-3 sm:px-4 lg:px-6 flex-1 flex flex-col md:flex-row gap-0 py-6">
        <aside className="hidden md:block w-64 shrink-0 mr-6">
          <div className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden sticky top-24">
            <div className="bg-[#004030]/5 dark:bg-[#D8C3A5]/5 px-4 py-3 border-b border-slate-200 dark:border-slate-700"><p className="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">{t.nav_modules}</p></div>
            <nav className="space-y-0.5 p-2">{modulesList.map(m=>(
              <button key={m.id} onClick={()=>{setModule(m.id);setMenuOpen(false);}} className={`w-full flex items-center px-3 py-2.5 rounded-lg text-sm font-medium transition-colors text-left ${module===m.id?'bg-[#004030] dark:bg-[#D8C3A5]/20 text-white dark:text-[#D8C3A5] border border-[#D8C3A5]/30':'text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700/50'}`}>
                <span className={`mr-2.5 ${module===m.id?'text-[#D8C3A5]':'opacity-50'}`}>{m.icon}</span><span className="truncate">{m.title}</span>
                {module===m.id&&<IconChevronRight size={14} className="ml-auto opacity-50 shrink-0"/>}
              </button>
            ))}</nav>
          </div>
        </aside>
        <main ref={contentRef} className="flex-1 min-w-0" onClick={handleClick}>
          <div className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm p-4 sm:p-6 md:p-8">{renderContent()}</div>
        </main>
      </div>
      <footer className="bg-[#004030] dark:bg-slate-950 text-slate-300 dark:text-slate-400 border-t border-[#D8C3A5]">
        <div className="max-w-7xl mx-auto px-4 h-8 flex justify-between items-center text-[10px] sm:text-xs">
          <div className="flex items-center space-x-2 md:space-x-4">
            <div className="font-serif font-black text-[#D8C3A5] hidden sm:block tracking-widest text-sm">DCL</div>
            <span className="truncate">{t.copyright} · {t.date}</span>
          </div>
          <div className="flex items-center space-x-3 md:space-x-4">
            <span className="text-[#D8C3A5]/70 font-serif hidden sm:inline">Architect:&nbsp;<a href={t.architect_url} target="_blank" rel="noopener noreferrer" className="text-[#D8C3A5] hover:text-white underline underline-offset-2 transition-colors">Prof. Shihmin Lo</a></span>
            <button onClick={()=>window.scrollTo({top:0,behavior:'smooth'})} className="flex items-center uppercase tracking-widest hover:text-white transition-colors border-l border-slate-600 pl-3"><IconChevronUp size={12} className="md:mr-1"/><span className="hidden sm:inline">TOP</span></button>
          </div>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
